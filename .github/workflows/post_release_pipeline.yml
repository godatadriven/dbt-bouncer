---
name: Post release pipeline

on:
    release:
        types: [published]

env:
    DBT_PROFILES_DIR: dbt_project
    DBT_PROJECT_DIR: dbt_project

jobs:
    pypi-pause:
        runs-on: ubuntu-24.04
        steps:
            - name: Wait for PyPI package availability
              run: |
                VERSION=$(echo "${{ github.ref }}" | cut -d "/" -f3 | sed 's/^v//')
                echo "Waiting for dbt-bouncer==$VERSION on PyPI..."
                TIMEOUT=600
                INTERVAL=30
                ELAPSED=0
                while [ $ELAPSED -lt $TIMEOUT ]; do
                  if curl -sf -A "dbt-bouncer-release-pipeline" "https://pypi.org/pypi/dbt-bouncer/$VERSION/json" > /dev/null 2>&1; then
                    echo "Package dbt-bouncer==$VERSION is available on PyPI."
                    exit 0
                  fi
                  echo "Not yet available, retrying in ${INTERVAL}s... (${ELAPSED}s elapsed)"
                  sleep $INTERVAL
                  ELAPSED=$((ELAPSED + INTERVAL))
                done
                echo "Timed out waiting for dbt-bouncer==$VERSION on PyPI after ${TIMEOUT}s."
                exit 1

    docker-tests:
        needs: [pypi-pause]
        permissions:
          contents: read
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Run Docker test
              run: |
                docker run --rm \
                  --volume "$PWD":/app \
                  ghcr.io/godatadriven/dbt-bouncer:$(echo "${{ github.ref }}" | cut -d "/" -f3) \
                  --config-file /app/dbt-bouncer-example.yml

    github-action-test:
        needs: [pypi-pause]
        permissions:
          contents: read
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              run: git clone https://github.com/godatadriven/dbt-bouncer.git --branch $(echo "${{ github.ref }}" | cut -d "/" -f3) --depth 1

            - name: Run `dbt-bouncer`
              uses: ./dbt-bouncer
              with:
                config-file: ./dbt-bouncer/dbt-bouncer-example.yml
                send-pr-comment: false

    pypi-tests:
        needs: [pypi-pause]
        permissions:
          contents: read
        runs-on: ${{ matrix.operating-system }}
        strategy:
            fail-fast: false
            matrix:
                operating-system:
                  - ubuntu-24.04
                  - windows-2025
                python-version:
                    - '3.11'
                    - '3.12'
                    - '3.13'
                    - '3.14'
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Python
              uses: ./.github/actions/setup_python_env
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install `dbt-bouncer`
              if: matrix.operating-system == 'windows-2025'
              run: |
                $env:DBT_BOUNCER_VERSION = $("${{ github.ref }}" -Split "/")[2].TrimStart("v")
                pip install "dbt-bouncer==$env:DBT_BOUNCER_VERSION"

            - name: Install `dbt-bouncer`
              if: matrix.operating-system != 'windows-2025'
              run: pip install dbt-bouncer==$(echo "${{ github.ref }}" | cut -d "/" -f3)

            - name: Run `dbt-bouncer`
              run: dbt-bouncer --config-file dbt-bouncer-example.yml

            - name: Regenerate dbt artifacts and run `dbt-bouncer`
              if: matrix.operating-system == 'windows-2025'
              run: |
                $env:Path += ';C:\Users\runneradmin\.local\bin'
                make build-and-run-dbt-bouncer

            - name: Regenerate dbt artifacts and run `dbt-bouncer`
              if: matrix.operating-system != 'windows-2025'
              run: |
                (r=3;while ! make build-and-run-dbt-bouncer ; do ((--r))||exit;done)
