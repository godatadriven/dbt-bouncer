---
  name: Merge pipeline

  on:
    push:
      branches:
        - main
    workflow_dispatch:

  env:
    DBT_PROFILES_DIR: dbt_project
    DBT_PROJECT_DIR: dbt_project

  jobs:
      benchmark-main-branch:
        permissions:
          checks: write
          contents: read
        runs-on: ubuntu-24.04
        steps:
          - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            with:
              persist-credentials: false

          - name: Setup Python
            uses: ./.github/actions/setup_python_env

          - name: Install `dbt-bouncer`
            run: pip install git+https://github.com/godatadriven/dbt-bouncer.git@${{ github.sha }}

          - name: Install bencher
            uses: bencherdev/bencher@0f8f620172ccd6225d40a7590598eb7b41718af8 # v0.6.2

          - name: Install Hyperfine
            uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
            with:
              tool: hyperfine@1.20

          - name: Track base branch benchmarks with Bencher
            run: |
              bencher run \
                --project dbt-bouncer \
                --token '${{ secrets.BENCHER_API_TOKEN }}' \
                --branch main \
                --testbed ubuntu-24.04 \
                --threshold-measure latency \
                --threshold-test t_test \
                --threshold-max-sample-size 64 \
                --threshold-upper-boundary 0.999 \
                --thresholds-reset \
                --err \
                --adapter shell_hyperfine \
                --format json \
                --github-actions '${{ secrets.GITHUB_TOKEN }}' \
                --file results.json \
                "hyperfine --export-json results.json --runs 10 'dbt-bouncer --config-file dbt-bouncer-example.yml'"

      coverage-badge:
          permissions:
            contents: write
          runs-on: ubuntu-24.04
          steps:
              - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
                with:
                  persist-credentials: true

              - name: Setup Python
                uses: ./.github/actions/setup_python_env

              - name: Run unit tests with coverage
                run: make test-unit

              - name: Generate coverage badge
                run: |
                  uv run --with genbadge[coverage] genbadge coverage \
                    --input-file coverage.xml \
                    --output-file coverage.svg

              - name: Publish badge to badges branch
                run: |
                  set -euo pipefail
                  cp coverage.svg /tmp/coverage.svg
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"
                  if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
                      git fetch origin badges:badges
                      git worktree add /tmp/badges badges
                  else
                      git worktree add --orphan -b badges /tmp/badges
                  fi
                  (cd /tmp/badges && git rm -rf . >/dev/null 2>&1 || true)
                  cp /tmp/coverage.svg /tmp/badges/coverage.svg
                  cd /tmp/badges
                  git add coverage.svg
                  if git diff --cached --quiet; then
                      echo "Badge unchanged, skipping push."
                  else
                      git commit -m "ci: update coverage badge"
                      git push origin badges
                  fi

      deploy-docs:
          permissions:
            contents: write
          runs-on: ubuntu-24.04
          steps:
              - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

              - name: Fetch tags
                run: git fetch --prune --unshallow --tags

              - name: Setup Python
                uses: ./.github/actions/setup_python_env

              - name: Deploy docs website
                run: |
                  git config --global user.email "bot@github.com"
                  git config --global user.name "github-actions[bot]"
                  uv run mike deploy --push --update-aliases latest

      docker-tests:
        permissions:
          contents: read
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                persist-credentials: false

            - name: Setup Python
              id: setup-python
              uses: ./.github/actions/setup_python_env

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

            - name: Modify Dockerfile to use local dbt-bouncer version
              run: |
                set -eou
                sed -i -E 's/ENTRYPOINT \["uvx", "dbt-bouncer==0.0.0"\]/ENTRYPOINT \["uvx", "."\]/' Dockerfile
                sed -i -E '/ENTRYPOINT/i\COPY . .' ./Dockerfile

            - name: Build image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  build-args: PYTHON_VERSION=${{ steps.setup-python.outputs.python-version }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  context: .
                  load: true
                  push: false
                  tags: dbt-bouncer:test

            - name: Run e2e test
              run: |
                docker run --rm \
                  --volume "$PWD":/app \
                  dbt-bouncer:test \
                  --config-file /app/dbt-bouncer-example.yml

      pip-tests:
        permissions:
          contents: read
        runs-on: ${{ matrix.operating-system }}
        strategy:
            fail-fast: false
            matrix:
                operating-system:
                  - ubuntu-24.04
                  - windows-2025
                python-version:
                    - '3.11'
                    - '3.12'
                    - '3.13'
                    - '3.14'
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                persist-credentials: false

            - name: Setup Python
              uses: ./.github/actions/setup_python_env
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install `dbt-bouncer`
              run: pip install git+https://github.com/godatadriven/dbt-bouncer.git@${{ github.sha }}

            - name: Run `dbt-bouncer`
              run: dbt-bouncer --config-file dbt-bouncer-example.yml

            - name: Regenerate dbt artifacts and run `dbt-bouncer`
              if: matrix.operating-system == 'windows-2025'
              run: |
                $env:Path += ';C:\Users\runneradmin\.local\bin'
                make build-and-run-dbt-bouncer

            - name: Regenerate dbt artifacts and run `dbt-bouncer`
              if: matrix.operating-system != 'windows-2025'
              run: |
                (r=3;while ! make build-and-run-dbt-bouncer ; do ((--r))||exit;done)
