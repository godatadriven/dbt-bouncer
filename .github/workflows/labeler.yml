name: Label PRs

on:
  # Use pull_request_target (not pull_request) so the workflow has write
  # permissions to add labels on PRs from forks.
  pull_request_target:
    types: [opened]

jobs:
  auto-labeler:
    name: auto-labeler
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - id: label-by-branch
        uses: actions/labeler@v6
        with:
          configuration-path: '.github/labels/branch_pass.yml'

      - id: label-by-files
        uses: actions/labeler@v6
        with:
          configuration-path: '.github/labels/files_pass.yml'

      - id: label-default
        if: >-
          ${{
            !contains(steps.label-by-branch.outputs.all-labels, 'bug') &&
            !contains(steps.label-by-branch.outputs.all-labels, 'enhancement') &&
            !contains(steps.label-by-branch.outputs.all-labels, 'documentation') &&
            !contains(steps.label-by-branch.outputs.all-labels, 'performance') &&
            !contains(steps.label-by-branch.outputs.all-labels, 'refactor') &&
            !contains(steps.label-by-branch.outputs.all-labels, 'ci')
          }}
        uses: actions/labeler@v6
        with:
          configuration-path: '.github/labels/default_pass.yml'
