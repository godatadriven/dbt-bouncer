name: 'Setup python environment'
description: 'Setup python environment'

inputs:
  install-python-deps:
    default: 'true'
    description: 'Install python dependencies'
    required: false
  python-version:
    default: ''
    description: 'Python version (defaults to .python-version file)'
    required: false

outputs:
  python-version:
    description: 'Resolved Python version'
    value: ${{ steps.resolve-version.outputs.python-version }}

runs:
  using: "composite"
  steps:
    - name: Resolve Python version
      id: resolve-version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.python-version }}
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          VERSION="$INPUT_VERSION"
        else
          VERSION=$(cat .python-version)
        fi
        echo "python-version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ steps.resolve-version.outputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      with:
        cache-suffix: py${{ steps.resolve-version.outputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      if: inputs.install-python-deps == 'true'
      shell: bash
      run: make install
