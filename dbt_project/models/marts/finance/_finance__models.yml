  - name: orders
    description: This table has basic information about orders, as well as some derived facts based on payments
    config:
      contract:
        enforced: true
      grants:
        select: ['reporter']
        write: ['operations']
      meta:
        maturity: gold
      access: public
    constraints:
      - type: primary_key
        columns: [order_id_pk]

    columns:
      - name: order_id_pk
        data_type: integer
        tests:
          - unique
          - not_null
        description: This is a unique identifier for an order
        config:
          meta:
            maturity: gold
      - name: customer_id_fk
        data_type: integer
        description: Foreign key to the customers table
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('customers')
                field: customer_id_pk
        config:
          meta:
            maturity: gold
      - name: order_date
        data_type: date
        description: Date (UTC) that the order was placed
        config:
          meta:
            maturity: gold
      - name: status
        data_type: string
        description: '{{ doc("orders_status") }}'
        tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

        config:
          meta:
            maturity: gold
      - name: amount
        data_type: double
        description: Total amount (AUD) of the order
        tests:
          - not_null

        config:
          meta:
            maturity: gold
      - name: credit_card_amount
        data_type: double
        description: Amount of the order (AUD) paid for by credit card
        tests:
          - not_null

        config:
          meta:
            maturity: gold
      - name: coupon_amount
        data_type: double
        description: Amount of the order (AUD) paid for by coupon
        tests:
          - not_null

        config:
          meta:
            maturity: gold
      - name: bank_transfer_amount
        data_type: double
        description: Amount of the order (AUD) paid for by bank transfer
        tests:
          - not_null

        config:
          meta:
            maturity: gold
      - name: gift_card_amount
        data_type: double
        description: Amount of the order (AUD) paid for by gift card
        tests:
          - not_null
        config:
          meta:
            maturity: gold
