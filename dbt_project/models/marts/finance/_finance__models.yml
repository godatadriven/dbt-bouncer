version: 2

models:
  - name: customers
    description: This table has basic information about a customer, as well as some derived facts based on a customer's orders
    config:
      contract:
        enforced: true
      grants:
        select: ['reporter', 'bi']
      meta:
        maturity: gold
      access: public
    latest_version: 3

    versions:
      - v: 3
        constraints:
          - type: primary_key
            columns: [customer_id_pk]
        columns:
          - name: customer_id_pk
            data_type: bigint
            description: This is a unique identifier for a customer
            meta:
              maturity: gold
            tests:
              - unique
              - not_null

          - name: first_name
            data_type: string
            description: Customer's first name. PII.
            meta:
              maturity: gold

          - name: last_name
            data_type: string
            description: Customer's last name. PII.
            meta:
              maturity: gold

          - name: new_column
            data_type: string
            description: New column to simulate a new version of this model
            meta:
              maturity: gold

          - name: first_order_date
            data_type: date
            description: Date (UTC) of a customer's first order
            meta:
              maturity: gold

          - name: most_recent_order_date
            data_type: date
            description: Date (UTC) of a customer's most recent order
            meta:
              maturity: gold

          - name: number_of_orders
            data_type: bigint
            description: Count of the number of orders a customer has placed
            meta:
              maturity: gold

          - name: is_recurring_customer
            data_type: boolean
            description: Boolean indicating whether a customer has placed more than five orders
            meta:
              maturity: gold
            tests:
              - not_null

          - name: customer_lifetime_value
            data_type: double
            description: Sum of all payments a customer has made
            meta:
              maturity: gold

      - v: 2
        constraints:
          - type: primary_key
            columns: [customer_id]
        columns:
          - name: customer_id
            data_type: bigint
            description: This is a unique identifier for a customer
            meta:
              maturity: gold
            tests:
              - unique
              - not_null

          - name: first_name
            data_type: string
            description: Customer's first name. PII.
            meta:
              maturity: gold

          - name: last_name
            data_type: string
            description: Customer's last name. PII.
            meta:
              maturity: gold

          - name: new_column
            data_type: string
            description: New column to simulate a new version of this model
            meta:
              maturity: gold

          - name: first_order_date
            data_type: date
            description: Date (UTC) of a customer's first order
            meta:
              maturity: gold

          - name: most_recent_order_date
            data_type: date
            description: Date (UTC) of a customer's most recent order
            meta:
              maturity: gold

          - name: number_of_orders
            data_type: bigint
            description: Count of the number of orders a customer has placed
            meta:
              maturity: gold

          - name: is_recurring_customer
            data_type: boolean
            description: Boolean indicating whether a customer has placed more than five orders
            meta:
              maturity: gold
            tests:
              - not_null

          - name: customer_lifetime_value
            data_type: double
            description: Sum of all payments a customer has made
            meta:
              maturity: gold

      - v: 1
        constraints:
          - type: primary_key
            columns: [customer_id]
        columns:
          - name: customer_id
            data_type: bigint
            description: This is a unique identifier for a customer
            meta:
              maturity: gold
            tests:
              - unique
              - not_null

          - name: first_name
            data_type: string
            description: Customer's first name. PII.
            meta:
              maturity: gold

          - name: last_name
            data_type: string
            description: Customer's last name. PII.
            meta:
