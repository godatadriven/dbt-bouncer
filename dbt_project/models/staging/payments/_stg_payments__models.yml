version: 2

models:
  - name: stg_payments
    description: Staging table for payment data.
    config:
      meta:
        maturity: gold
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null
      - name: payment_method
        tests:
          - accepted_values:
              arguments:
                values: ['credit_card', 'coupon', 'bank_transfer', 'gift_card']

  - name: stg_raw_orders_for_snapshot
    description: Ephemeral wrapper around raw_orders that casts order_date to TIMESTAMP so it can be used as the snapshot updated_at column (Fusion requires snapshot timestamp columns to be datetime, not date).
    config:
      meta:
        maturity: gold
    columns:
      - name: id
        tests:
          - unique
          - not_null
