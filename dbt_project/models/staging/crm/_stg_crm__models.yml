version: 2

models:
  - name: stg_customers
    description: Staging table for customer data.
    config:
      meta:
        maturity: gold
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: Staging table for orders data.
    config:
      meta:
        maturity: gold
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: stg_raw_orders_for_snapshot
    description: Ephemeral wrapper around raw_orders that casts order_date to TIMESTAMP so it can be used as the snapshot updated_at column (Fusion requires snapshot timestamp columns to be datetime, not date).
    config:
      meta:
        maturity: gold
    columns:
      - name: id
        tests:
          - unique
          - not_null
