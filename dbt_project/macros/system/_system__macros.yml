version: 2

macros:
  - name: apply_grants
    description: Override of dbt's apply_grants that skips grant application on dbt 2.0 (Fusion), where the bundled macro is incompatible with the duckdb adapter.
    arguments:
      - name: relation
        description: The relation to which grants would be applied.
      - name: grant_config
        description: The resolved grants configuration for the relation.
      - name: should_revoke
        description: Whether existing grants should be revoked before applying.

  - name: dbt_version_at_least
    description: Return true when the running dbt version is at least the given major.minor target.
    arguments:
      - name: target
        description: The minimum dbt version to compare against, as a 'major.minor' string.

  - name: generate_schema_name
    description: |
      A macro that uses the DBT_DATASET env var only when using the dev target. On the stg and prd targets this env var is not used. This ensures that systems that read from the stg and prd BigQuery instances can use the same dataset and table names, they only need to vary the GCP project id.
    arguments:
      - name: custom_schema_name
        description: The variable dbt will pass to this macro
      - name: node
        description: The various objects (models, tests, seeds, etc.)
